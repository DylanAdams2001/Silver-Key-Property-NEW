<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Silver Key Property | Supported Housing Investment Guide</title>
<script>
// Split test router: sends visitors to index-a.html (control) or
// index-b.html (guide form embedded in the hero), 50/50, sticky per
// browser via localStorage so repeat visits land on the same variant.
// Query string (utm/gclid/fbclid etc.) is preserved on the redirect.
(function () {
  var KEY = 'sh_variant';
  var v;
  try { v = localStorage.getItem(KEY); } catch (e) {}
  if (v !== 'a' && v !== 'b') {
    v = Math.random() < 0.5 ? 'a' : 'b';
    try { localStorage.setItem(KEY, v); } catch (e) {}
  }
  window.location.replace('index-' + v + '.html' + window.location.search + window.location.hash);
})();
</script>
</head>
<body>
</body>
</html>
